{% extends "base.html" %}
{% block title %}{{ 'Edit Member' if member else 'Add Member' }} – Rehearsal Scheduler{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ 'Edit Cast Member' if member else 'Add Cast Member' }}</h1>
  <a href="{{ url_for('roster') }}" class="btn btn-outline">Back to Roster</a>
</div>

<form method="POST" class="form-card">
  <div class="form-row">
    <div class="form-group flex-2">
      <label for="name">Name *</label>
      <input type="text" id="name" name="name" required
             value="{{ member.name if member else '' }}"
             placeholder="Full name" />
    </div>
    <div class="form-group">
      <label for="role">Role / Instrument</label>
      <input type="text" id="role" name="role"
             value="{{ member.role if member else '' }}"
             placeholder="e.g. Lead Vocals, Keys, Guitar" />
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone"
             value="{{ member.phone if member else '' }}"
             placeholder="(555) 555-5555" />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email"
             value="{{ member.email if member else '' }}"
             placeholder="name@example.com" />
    </div>
  </div>
  <div class="form-group">
    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="2"
              placeholder="Availability, preferences…">{{ member.notes if member else '' }}</textarea>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">{{ 'Save Changes' if member else 'Add Member' }}</button>
    <a href="{{ url_for('roster') }}" class="btn btn-outline">Cancel</a>
  </div>
</form>
{% endblock %}
