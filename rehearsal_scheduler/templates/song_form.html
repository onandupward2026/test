{% extends "base.html" %}
{% block title %}{{ 'Edit Song' if song else 'Add Song' }} – Rehearsal Scheduler{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ 'Edit Song' if song else 'Add Song to Library' }}</h1>
  <a href="{{ url_for('songs') }}" class="btn btn-outline">Back to Library</a>
</div>

<form method="POST" class="form-card">
  <div class="form-row">
    <div class="form-group flex-2">
      <label for="title">Title *</label>
      <input type="text" id="title" name="title" required
             value="{{ song.title if song else '' }}"
             placeholder="Song title" />
    </div>
    <div class="form-group">
      <label for="key">Key</label>
      <input type="text" id="key" name="key"
             value="{{ song.key if song else '' }}"
             placeholder="e.g. G, Bb, C#m" />
    </div>
  </div>
  <div class="form-group">
    <label for="artist">Artist / Writer</label>
    <input type="text" id="artist" name="artist"
           value="{{ song.artist if song else '' }}"
           placeholder="e.g. Hillsong, Chris Tomlin" />
  </div>
  <div class="form-group">
    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="3"
              placeholder="Tempo, special instructions, CCLI #…">{{ song.notes if song else '' }}</textarea>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">{{ 'Save Changes' if song else 'Add Song' }}</button>
    <a href="{{ url_for('songs') }}" class="btn btn-outline">Cancel</a>
  </div>
</form>
{% endblock %}
